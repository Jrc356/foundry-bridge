services:
  bridge:
    build:
      context: .
      target: bridge
    container_name: foundry-bridge
    ports:
      - "8765:8765"
      - "8766:8766"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  transcriber:
    build:
      context: .
      target: transcriber
    container_name: foundry-transcriber
    restart: unless-stopped
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - BRIDGE_URI=ws://bridge:8765
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "foundry_bridge.health_check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
