services:
  postgres:
    image: postgres:16-alpine
    container_name: foundry-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=foundry
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foundry}
      - POSTGRES_DB=foundry_bridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d foundry_bridge"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      target: migrate
    container_name: foundry-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_bridge
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]

  bridge:
    build:
      context: .
      target: bridge
    container_name: foundry-bridge
    ports:
      - "8765:8765"
      - "8766:8766"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_bridge
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - MODEL_PROVIDER=${MODEL_PROVIDER:-openai}
      - MODEL=${MODEL:-gpt-5.4}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NOTE_CADENCE_MINUTES=${NOTE_CADENCE_MINUTES:-10}
      - WS_PORT=${WS_PORT:-8765}
      - HTTP_PORT=${HTTP_PORT:-8766}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
